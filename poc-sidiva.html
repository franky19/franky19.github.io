<!doctype html>
<html lang="id">

    <link

      type="image/png"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

    <!-- Google tag (gtag.js) -->
    <script

      src="https://www.googletagmanager.com/gtag/js?id=G-7HT03RH4CG"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-7HT03RH4CG");
    </script>

  <body
    class="bg-white h-screen max-h-screen flex items-center justify-center p-0 md:p-6 overflow-hidden"
  >
    <div

    >
      <div

                alt="XL Logo"
                class="w-full h-full object-contain scale-[0.8]"
              />
            </div>
            <span
              class="text-gray-800 font-semibold text-[15px] md:text-[16px] flex-1"
              >Registrasi XL</span
            >
            <svg
              class="w-5 h-5 text-gray-400 group-hover:text-blue-500 group-hover:translate-x-1 transition-all duration-300 shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"

              <path

              gtag('event', 'click_registrasi', {

          >
            <div
              class="w-14 h-14 flex items-center justify-center overflow-hidden shrink-0 rounded-xl p-0.5 transition-all duration-300"
            >
              <img
                src="https://static-cms-xlsmart.xlaxiata.my.id/production/2026/05/20/c452870d-6d41-4788-8666-27e023896bc0.png"

                class="w-full h-full object-contain scale-[1.3]"
              />
            </div>
            <span
              class="text-gray-800 font-semibold text-[15px] md:text-[16px] flex-1"

            >
            <svg
              class="w-5 h-5 text-gray-400 group-hover:text-purple-500 group-hover:translate-x-1 transition-all duration-300 shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5l7 7-7 7"
              />
            </svg>
          </a>

          <a
            href="http://testing-ocr-olive.vercel.app/retail-outlet"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Registrasi Smartfren"
            class="group bg-white rounded-2xl pl-5 pr-5 flex items-center gap-4 border border-gray-100 shadow-md hover:shadow-xl hover:border-red-200 hover:bg-gradient-to-r hover:from-red-50 hover:to-white transition-all duration-300 cursor-pointer min-h-[68px] md:min-h-[76px]"
          >
            <div
              class="w-14 h-14 flex items-center justify-center overflow-hidden shrink-0 rounded-xl p-1 transition-all duration-300"
            >
              <img
                src="https://static-cms-xlsmart.xlaxiata.my.id/production/2026/05/21/84689dab-d3a9-4fe7-a21c-5f5465031fd1.png"

                class="w-full h-full object-contain"
              />
            </div>
            <span
              class="text-gray-800 font-semibold text-[15px] md:text-[16px] flex-1"
              >Registrasi Smartfren</span
            >
            <svg
              class="w-5 h-5 text-gray-400 group-hover:text-red-500 group-hover:translate-x-1 transition-all duration-300 shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5l7 7-7 7"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>
  </body>
  <script>
    document.querySelectorAll('a[aria-label^="Registrasi"]').forEach((link) => {
      link.addEventListener("click", async (event) => {
        event.preventDefault();

        const provider = link
          .getAttribute("aria-label")
          .replace("Registrasi ", "");

        const href = link.href;

        try {
          // Google Analytics
          gtag("event", "click_registrasi", {
            provider,
            event_category: "registrasi",
          });

          // Hanya Smartfren yang memanggil API
          if (provider.toLowerCase() === "smartfren") {
            const response = await fetch(
              "http://testing-ocr-olive.vercel.app/api/token-ro",
              {
                method: "POST",
                credentials: "include",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: "eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCIsImV4cGlyZXNJbiI6MTkxMDEzNzU4NiwiaXNzdWVyIjoiU0lESVZBIn0.eyJpc3N1ZWRBdCI6MTc4MzkzMjM4NiwiaXNXaGl0ZWxpc3RSbyI6dHJ1ZSwicm9JZCI6IjU4NzM2MjEifQ.YvtstDw51O2lowSZFhCAHf4vSCnHCFa0SzlcIZlz-QG4gPV1N0f-uxPhegmH6XL5ZBU9n1KV4J_IugfIihp8_g",
                },
                body: JSON.stringify({
                  provider,
                }),
              },
            );
            if (response.redirected) {
              window.location.href = response.url;
            }
          }
          if (provider.toLowerCase() === "Axis") {
          }
          if (provider.toLowerCase() === "XL") {
          }
        } catch (err) {
          alert("error: " + err.message);
        } finally {
          // Setelah semua selesai, buka halaman tujuan
          window.open(href, "_blank", "noopener,noreferrer");
        }
      });
    });
  </script>
</html>
